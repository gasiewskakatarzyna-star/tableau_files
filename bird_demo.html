<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau Dashboard SVG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1000px;
            height: 700px;
            overflow: hidden;
            background-color: #ffffff;
        }

        .dashboard-container {
            width: 1000px;
            height: 700px;
            position: relative;
        }

        /* Animation: Bird flies out to the top-right */
        @keyframes exitStageRight {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(600px, -500px);
                opacity: 0;
            }
        }

        /* Targeting the bird group specifically */
        #the-bird {
            animation: exitStageRight 2.5s ease-in forwards;
            animation-delay: 3s;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <svg viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1000" height="116" fill="url(#header_grad)"/>
        <text x="44" y="74" fill="white" style="font-family: sans-serif; font-size: 52px; font-weight: 200; letter-spacing: 2px;">
            MY <tspan font-weight="bold">DASHBOARD</tspan> EXAMPLE
        </text>

        <text x="44" y="178" fill="black" style="font-family: sans-serif; font-size: 22px; font-weight: 600; text-transform: uppercase;">What is Lorem Ipsum?</text>
        <line x1="44" y1="205" x2="956" y2="205" stroke="#D1D5DB" stroke-width="1"/>
        
        <foreignObject x="44" y="235" width="440" height="400">
            <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: sans-serif; color: #9CA3AF; font-size: 19px; line-height: 1.5; font-weight: 300;">
                Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book. It has survived not only five centuries, but also the leap into electronic typesetting, remaining essentially unchanged.
            </div>
        </foreignObject>

        <rect x="44" y="555" width="195" height="68" rx="34" fill="black"/>
        <text x="141" y="597" fill="white" text-anchor="middle" style="font-family: sans-serif; font-size: 18px; letter-spacing: 1px;">OPTION 1</text>

        <rect x="256" y="555" width="195" height="68" rx="34" stroke="black" stroke-width="1" fill="none"/>
        <text x="353" y="597" fill="black" text-anchor="middle" style="font-family: sans-serif; font-size: 18px; letter-spacing: 1px;">OPTION 2</text>

        <g opacity="0.15">
            <path d="M1000 700L850 700L925 600Z" fill="#333"/>
            <path d="M925 600L1000 600L1000 500Z" fill="#666"/>
            <path d="M850 700L775 600L850 500Z" fill="#999"/>
            <path d="M1000 500L925 400L1000 300Z" fill="#444"/>
        </g>

        <g id="the-bird">
            <path d="M570 360 C580 300 650 220 850 200 C800 300 860 450 710 560 C730 500 680 450 640 430 C600 450 580 500 580 500 L570 360Z" fill="url(#bird_grad_complex)"/>
            <path d="M640 430 L680 550 L620 520 Z" fill="#2E90FA" /> </g>

        <defs>
            <linearGradient id="header_grad" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1E40AF"/>
                <stop offset="1" stop-color="#3B82F6"/>
            </linearGradient>
            <linearGradient id="bird_grad_complex" x1="570" y1="200" x2="850" y2="560" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FDB022"/>
                <stop offset="0.4" stop-color="#D444F1"/>
                <stop offset="1" stop-color="#0086C9"/>
            </linearGradient>
        </defs>
    </svg>
</div>

</body>
</html>
