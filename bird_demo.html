<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau Dashboard Exact</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1000px;
            height: 700px;
            overflow: hidden;
            background-color: white;
        }

        /* This ensures the bird leaves the 1000x700 area completely */
        @keyframes flyAway {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(1100px, -400px); /* Moves it past the right edge */
                opacity: 0;
            }
        }

        /* We target the specific group ID from your actual file */
        #new_bird {
            animation: flyAway 2s ease-in forwards;
            animation-delay: 3s;
            transform-box: fill-box;
            transform-origin: center;
        }

        svg {
            width: 1000px;
            height: 700px;
            display: block;
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
        </svg>

</body>
</html>
