<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Animation</title>
    <style>
        svg {
            width: 100%;
            height: auto;
        }

        .bird {
            animation: fly 3s forwards;
        }

        @keyframes fly {
            0% { transform: translate(0, 0); }
            100% { transform: translate(200%, 0); } /* Move out of viewbox */
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100">
        <circle class="bird" cx="10" cy="50" r="5" fill="yellow" />
    </svg>
</body>
</html>
